<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Claims</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f0f0f; 
      color: #fff; 
      padding: 20px; 
      margin: 0;
    }
    h1 { margin-bottom: 10px; }
    .controls { margin: 15px 0; }
    button { 
      padding: 10px 18px; 
      margin-right: 10px; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold;
    }
    .refresh { background: #4ade80; color: black; }
    .export { background: #60a5fa; color: white; }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 10px; 
      background: #1a1a1a;
    }
    th, td { 
      padding: 12px; 
      text-align: left; 
      border-bottom: 1px solid #444; 
    }
    th { background: #222; }
    tr.shipped { opacity: 0.7; background: #1f2a1f; }
    .shipped td { text-decoration: line-through; }
    input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
  </style>
</head>
<body>
  <h1>📦 Claim Orders</h1>
  
  <div class="controls">
    <button class="refresh" onclick="loadClaims()">🔄 Refresh</button>
    <button class="export" onclick="exportToCSV()">📥 Export CSV</button>
  </div>

  <div id="stats"></div>

  <table id="claimsTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Name</th>
        <th>Shipping Address</th>
        <th>Inscription</th>
        <th>Notes</th>
        <th>Sent?</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let ADMIN_PASS = '';

    // Ask password once
    if (!ADMIN_PASS) {
      ADMIN_PASS = prompt("Enter admin password:");
      if (!ADMIN_PASS) {
        document.body.innerHTML = "<h2 style='color:red'>Password required.</h2>";
      }
    }

    async function loadClaims() {
      const res = await fetch(`/api/admin/claims?pass=${encodeURIComponent(ADMIN_PASS)}`);
      const data = await res.json();
      
      if (data.error) {
        alert(data.error);
        return;
      }

      document.getElementById('stats').innerHTML = `<strong>Total claims: ${data.total}</strong>`;

      const tbody = document.querySelector('#claimsTable tbody');
      tbody.innerHTML = '';

      data.claims.forEach(c => {
        const isShipped = c.shipped === 'true' || c.shipped === true;
        const row = document.createElement('tr');
        if (isShipped) row.classList.add('shipped');

        row.innerHTML = `
          <td>${new Date(c.timestamp).toLocaleString()}</td>
          <td>${c.name}</td>
          <td>${c.shippingAddress.replace(/\n/g, '<br>')}</td>
          <td>${c.inscriptionId.slice(0,12)}...</td>
          <td>${c.notes || '-'}</td>
          <td>
            <input type="checkbox" 
                   ${isShipped ? 'checked' : ''} 
                   onchange="toggleShipped('${c.address}', this.checked)">
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    async function toggleShipped(address, shipped) {
      const res = await fetch('/api/admin/mark-shipped', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          pass: ADMIN_PASS, 
          address, 
          shipped 
        })
      });

      const result = await res.json();
      if (result.success) {
        loadClaims(); // refresh
      } else {
        alert(result.error || 'Failed to update');
      }
    }

    async function exportToCSV() {
      const res = await fetch(`/api/admin/claims?pass=${encodeURIComponent(ADMIN_PASS)}`);
      const data = await res.json();
      
      let csv = "Date,Name,Address,Inscription,Notes,Sent\n";
      data.claims.forEach(c => {
        const escapedAddress = `"${c.shippingAddress.replace(/"/g, '""')}"`;
        csv += `${c.timestamp},${c.name},${escapedAddress},${c.inscriptionId},${c.notes || ''},${c.shipped || 'false'}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `claims-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    // Auto load on page open
    loadClaims();
  </script>
</body>
</html>
